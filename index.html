<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J3K0 - ศูนย์รวมระบบงาน</title>
    <style>
        /* ตั้งค่าเริ่มต้น */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f4f7f6;
        }
        
        /* -------------------------------------
           ส่วนที่ 1: หน้าเมนูชุมทาง (Hub Menu)
           ------------------------------------- */
        #hub-menu {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
        }
        .hub-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        .hub-title {
            margin-top: 0;
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: none;
            font-family: inherit;
        }
        
        /* ปุ่มที่ 1 (กดแล้วเปลี่ยนหน้าจอ) */
        .btn-active {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        .btn-active:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.4);
        }

        /* ปุ่มที่ 2 (ยังไม่เปิดใช้งาน) */
        .btn-disabled {
            background: #e0e0e0;
            color: #9e9e9e;
            cursor: not-allowed;
            pointer-events: none;
        }
        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: #aaaaaa;
        }

        /* -------------------------------------
           ส่วนที่ 2: กรอบแอปพลิเคชัน (iframe)
           ------------------------------------- */
        #app-container {
            display: none; /* ซ่อนไว้ก่อนตอนโหลดหน้าแรก */
            width: 100vw;
            height: 100vh;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div id="hub-menu">
        <div class="hub-container">
            <h2 class="hub-title">📌 ระบบงานกลุ่ม J3K0</h2>
            
            <button onclick="openApp('https://script.google.com/a/macros/kkumail.com/s/AKfycbzYN1t1dTvZ4wURqIWgs_UM0q29_wlUmWAVUmG5ZhvQfOes7z57f-Nsuj7XdzDQYhTq/exec')" class="btn btn-active">
               ระบบลงทะเบียนเข้าเรียน CL301101
            </button>

            <button class="btn btn-disabled">
               ระบบติดตามคะแนนเข้าเรียน
            </button>

            <div class="footer">Powered by J3K0 Team</div>
        </div>
    </div>

    <div id="app-container">
        <iframe id="app-frame" allow="geolocation"></iframe>
    </div>

    <script>
        function openApp(url) {
            // 1. ซ่อนหน้าเมนูชุมทาง
            document.getElementById('hub-menu').style.display = 'none';
            
            // 2. เอา URL ของ Apps Script ไปใส่ใน iframe
            document.getElementById('app-frame').src = url;
            
            // 3. แสดงผล iframe แบบเต็มจอ
            document.getElementById('app-container').style.display = 'block';
            
            // 4. เปลี่ยนสีพื้นหลังให้เป็นสีขาวล้วน
            document.body.style.backgroundColor = "#fff";
        }
    </script>

</body>
</html>
